<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Torplex</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
        header { background: #1a1a2e; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #2a2a4a; }
        header h1 { font-size: 1.6rem; color: #7c4dff; }
        header span { font-size: 0.85rem; color: #888; }
        main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        .toolbar { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: center; }
        .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #7c4dff; color: #fff; }
        .btn-danger { background: #e53935; color: #fff; }
        .btn-warn { background: #fb8c00; color: #fff; }
        .mode-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .mode-balanced { background: #1b5e20; color: #a5d6a7; }
        .mode-direct { background: #1a237e; color: #90caf9; }
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 8px; overflow: hidden; }
        th { background: #12122a; color: #7c4dff; text-align: left; padding: 0.8rem 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 0.8rem 1rem; border-bottom: 1px solid #2a2a4a; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        .status-up { color: #66bb6a; font-weight: 600; }
        .status-down { color: #ef5350; font-weight: 600; }
        .actions { display: flex; gap: 0.5rem; }
        .empty { text-align: center; padding: 3rem; color: #555; }
    </style>
</head>
<body>
<header>
    <h1>⚡ Torplex</h1>
    <span>Multi Tor Proxy Manager</span>
</header>
<main>
    <div class="toolbar">
        <button class="btn btn-primary" onclick="createProxy()">+ Add Proxy</button>
        <button class="btn" style="background:#263238;color:#fff" onclick="toggleMode()">
            Mode: <span id="mode-label">Balanced</span>
        </button>
        <button class="btn" style="background:#263238;color:#fff" onclick="loadProxies()">↻ Refresh</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Status</th>
                <th>SOCKS5 Port</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="proxy-list">
            <tr><td colspan="4" class="empty">Loading...</td></tr>
        </tbody>
    </table>
</main>
<script>
const API = '/api';
let mode = 'balanced';

async function loadProxies() {
    const res = await fetch(`${API}/proxies`);
    const data = await res.json();
    const tbody = document.getElementById('proxy-list');
    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">No proxies running. Click "+ Add Proxy" to start.</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(p => {
        const up = p.status.startsWith('Up');
        const port = p.ports.match(/(\d+)->9050/)?.[1] || '—';
        return `<tr>
            <td>${p.name}</td>
            <td class="${up ? 'status-up' : 'status-down'}">${up ? '● Running' : '● Stopped'}</td>
            <td>${port}</td>
            <td class="actions">
                <button class="btn btn-warn" onclick="renewCircuit('${p.name}')">↻ Renew</button>
                <button class="btn btn-danger" onclick="deleteProxy('${p.name}')">✕ Remove</button>
            </td>
        </tr>`;
    }).join('');
}

async function createProxy() {
    await fetch(`${API}/proxies`, { method: 'POST' });
    loadProxies();
}

async function deleteProxy(name) {
    if (!confirm(`Remove ${name}?`)) return;
    await fetch(`${API}/proxies/${name}`, { method: 'DELETE' });
    loadProxies();
}

async function renewCircuit(name) {
    await fetch(`${API}/proxies/${name}/renew`, { method: 'POST' });
    loadProxies();
}

function toggleMode() {
    mode = mode === 'balanced' ? 'direct' : 'balanced';
    document.getElementById('mode-label').textContent = mode === 'balanced' ? 'Balanced' : 'Direct';
}

loadProxies();
setInterval(loadProxies, 10000);
</script>
</body>
</html>
