<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Torplex</title>
<style>
:root {
  --bg:       #111827;
  --surface:  #1f2937;
  --surface2: #283347;
  --border:   #374151;
  --accent:   #3b82f6;
  --accent-d: #2563eb;
  --success:  #10b981;
  --warning:  #f59e0b;
  --danger:   #ef4444;
  --text:     #f3f4f6;
  --muted:    #9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
header{background:var(--surface);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:baseline;gap:.6rem}
.logo h1{font-size:1.3rem;font-weight:700;color:var(--accent)}
.logo span{font-size:.8rem;color:var(--muted)}
.header-right{display:flex;gap:.7rem;align-items:center}
main{padding:1.8rem 2rem;max-width:1280px;margin:0 auto}
.toolbar{display:flex;gap:.7rem;margin-bottom:1.4rem;align-items:center;flex-wrap:wrap}
.refresh-note{color:var(--muted);font-size:.78rem;margin-left:.2rem}

/* Buttons */
.btn{padding:.42rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.84rem;font-weight:500;transition:filter .15s,opacity .15s;display:inline-flex;align-items:center;gap:.4rem}
.btn:hover{filter:brightness(1.12)}
.btn:active{filter:brightness(.92)}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#111}

/* Badge */
.badge{padding:.22rem .7rem;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.04em}
.badge-balanced{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.badge-direct{background:#1e3a5f;color:#93c5fd;border:1px solid #1e40af}

/* Table */
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
th{background:#161d2b;color:var(--muted);text-align:left;padding:.65rem 1rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
td{padding:.72rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle;line-height:1.4}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.4rem}
.dot-up{background:var(--success);box-shadow:0 0 6px var(--success)}
.dot-down{background:var(--danger)}
.dot-pending{background:var(--warning);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mono{font-family:'Menlo','Consolas',monospace;font-size:.82rem;background:#0d1117;padding:.15rem .45rem;border-radius:4px;border:1px solid var(--border);color:#93c5fd}
.country-pill{display:inline-flex;align-items:center;gap:.35rem;font-size:.84rem}
.strict-tag{font-size:.68rem;background:#451a03;color:#fcd34d;padding:.1rem .4rem;border-radius:4px;font-weight:600}
.ip-cell{font-size:.8rem;color:var(--muted);font-family:monospace}
.actions{display:flex;gap:.4rem}
.empty{text-align:center;padding:3rem;color:var(--muted)}
.loading-row td{text-align:center;padding:2rem;color:var(--muted)}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.8rem;width:460px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h2{font-size:1rem;font-weight:600;margin-bottom:1.4rem;color:var(--text)}
.fg{margin-bottom:1.1rem}
.fg label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
.fg select,.fg input{width:100%;background:#0d1117;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.45rem .75rem;font-size:.88rem;outline:none}
.fg select:focus,.fg input:focus{border-color:var(--accent)}
.fg-row{display:flex;gap:.8rem}
.fg-row .fg{flex:1}
.toggle-row{display:flex;align-items:center;gap:.6rem;cursor:pointer;font-size:.88rem;color:var(--muted)}
.modal-footer{display:flex;gap:.7rem;justify-content:flex-end;margin-top:1.6rem;padding-top:1.2rem;border-top:1px solid var(--border)}
.section-sep{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:1.3rem 0 .7rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.kv{display:flex;justify-content:space-between;padding:.4rem 0;font-size:.86rem;border-bottom:1px solid #1a2030}
.kv span:first-child{color:var(--muted)}
.kv code{font-family:monospace;color:#93c5fd;font-size:.82rem}
/* Hide native number input spinners */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.7rem 1.2rem;font-size:.85rem;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>⚡ Torplex</h1>
    <span>Multi Tor Proxy Manager</span>
  </div>
  <div class="header-right">
    <span id="mode-badge" class="badge badge-balanced">Balanced</span>
    <button class="btn btn-ghost" onclick="openSettings()">⚙ Settings</button>
  </div>
</header>

<main>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openAdd()">+ Add Proxy</button>
    <button class="btn btn-ghost" onclick="renewAll()">↻ Renew All</button>
    <button class="btn btn-danger" onclick="killAll()">✕ Kill All</button>
    <span class="refresh-note" id="refresh-note" onclick="loadProxies()" title="Click to refresh" style="cursor:pointer;margin-left:auto">↻ <span id="refresh-time">—</span></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Exit Country</th>
        <th>Exit IP</th>
        <th>SOCKS5</th>
        <th>HTTP</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="proxy-list">
      <tr class="loading-row"><td colspan="7">Loading…</td></tr>
    </tbody>
  </table>
</main>

<!-- Add Proxy Modal -->
<div class="overlay" id="modal-add">
  <div class="modal">
    <h2>+ Add Tor Proxy</h2>
    <div class="fg">
      <label>Exit Country</label>
      <select id="add-country"><option value="any">🌍 Any (random)</option></select>
    </div>
    <div class="fg">
      <label class="toggle-row">
        <input type="checkbox" id="add-strict">
        Strict mode — force selected country (StrictNodes 1)
      </label>
    </div>
    <div class="fg">
      <label>Quantity</label>
      <div style="display:flex;align-items:center;gap:.5rem">
        <button type="button" class="btn btn-ghost" style="padding:.3rem .85rem;font-size:1.1rem;line-height:1" onclick="changeQty(-1)">−</button>
        <input type="number" id="qty-display" value="1" min="1" max="50"
          style="width:5rem;text-align:center;font-size:1rem;font-weight:600;background:#0d1117;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.35rem .5rem"
          oninput="updateLaunchBtn()">
        <button type="button" class="btn btn-ghost" style="padding:.3rem .85rem;font-size:1.1rem;line-height:1" onclick="changeQty(1)">+</button>
        <span style="color:var(--muted);font-size:.82rem">proxy(ies)</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cancel</button>
      <button class="btn btn-primary" onclick="doCreate()" id="btn-launch">Launch 1 Proxy</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay" id="modal-settings">
  <div class="modal">
    <h2>⚙ Settings</h2>

    <div class="section-sep">Load Balancer</div>
    <div class="fg-row">
      <div class="fg">
        <label>Mode</label>
        <select id="s-mode" onchange="updateBadge()">
          <option value="balanced">Balanced (HAProxy :9050)</option>
          <option value="direct">Direct (per-proxy ports)</option>
        </select>
      </div>
    </div>

    <div class="section-sep">Tor Control</div>
    <div class="fg-row">
      <div class="fg">
        <label>Control Password</label>
        <input type="password" id="s-ctrlpass" value="torplex">
      </div>
      <div class="fg">
        <label>NEWNYM Cooldown (s)</label>
        <input type="number" id="s-cooldown" value="10" readonly style="color:var(--muted)">
      </div>
    </div>

    <div class="section-sep">Port Allocation</div>
    <div class="fg-row">
      <div class="fg"><label>SOCKS5 base</label><input id="s-socks" value="10801" readonly style="color:var(--muted)"></div>
      <div class="fg"><label>HTTP base</label><input id="s-http" value="11801" readonly style="color:var(--muted)"></div>
    </div>

    <div class="section-sep">Instance</div>
    <div class="kv"><span>Host</span><code id="kv-host">—</code></div>
    <div class="kv"><span>HAProxy Stats</span><code id="kv-stats">—</code></div>
    <div class="kv"><span>Backend API</span><code id="kv-api">—</code></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-settings')">Close</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let countries = {};
let ipCache   = {};   // name → {ip, country, country_name}
let mode = 'balanced';

function flag(code){
  if(!code||code==='any') return '🌍';
  return code.toUpperCase().replace(/./g,c=>String.fromCodePoint(127397+c.charCodeAt(0)));
}

function toast(msg, ms=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

function updateBadge(){
  const sel=document.getElementById('s-mode');
  if(sel) mode=sel.value;
  const b=document.getElementById('mode-badge');
  b.textContent=mode==='balanced'?'Balanced':'Direct';
  b.className='badge '+(mode==='balanced'?'badge-balanced':'badge-direct');
}

async function init(){
  const [c,s]=await Promise.all([
    fetch(`${API}/countries`).then(r=>r.json()),
    fetch(`${API}/settings`).then(r=>r.json()),
  ]);
  countries=c; mode=s.mode; updateBadge();

  const sel=document.getElementById('add-country');
  Object.entries(c).filter(([k])=>k!=='any').sort((a,b)=>a[1].localeCompare(b[1])).forEach(([code,name])=>{
    const o=document.createElement('option');
    o.value=code; o.textContent=`${flag(code)} ${name}`; sel.appendChild(o);
  });

  document.getElementById('s-socks').value=s.base_socks_port+1;
  document.getElementById('s-http').value=s.base_http_port+1;
  document.getElementById('s-cooldown').value=s.newnym_cooldown_s;
  const h=location.hostname;
  document.getElementById('kv-host').textContent=h;
  document.getElementById('kv-stats').textContent=`${h}:8404/stats`;
  document.getElementById('kv-api').textContent=`${h}:8000`;

  loadProxies();
}

async function fetchIp(name, socks_port){
  try{
    const d=await fetch(`${API}/proxies/${name}/ip`).then(r=>r.json());
    ipCache[name]=d;
    // update just that cell
    const cell=document.getElementById(`ip-${name}`);
    if(cell) cell.innerHTML=renderIpCell(d);
  }catch(e){}
}

function renderIpCell(d){
  if(!d||!d.ip) return `<span style="color:var(--muted);font-size:.78rem">—</span>`;
  return `<span class="ip-cell">${d.ip}<br><small>${flag(d.country)} ${d.country_name||d.country||''}</small></span>`;
}

async function loadProxies(){
  const data=await fetch(`${API}/proxies`).then(r=>r.json());
  document.getElementById('refresh-time').textContent=new Date().toLocaleTimeString();
  const tbody=document.getElementById('proxy-list');

  if(!data.length){
    tbody.innerHTML='<tr><td colspan="7" class="empty">No proxies running — click "+ Add Proxy" to start</td></tr>';
    return;
  }

  tbody.innerHTML=data.map(p=>{
    const up=p.running;
    const ctry=p.country&&p.country!=='any'?p.country:null;
    const label=ctry?`${flag(ctry)} ${countries[ctry]||ctry}`:'🌍 Any';
    const cached=ipCache[p.name];
    const ipHtml=cached?renderIpCell(cached):`<span style="color:var(--muted);font-size:.78rem">…</span>`;
    return `<tr>
      <td><strong>${p.name}</strong></td>
      <td>
        <span class="status-dot ${up?'dot-up':'dot-down'}"></span>
        ${up?'Running':'Stopped'}
      </td>
      <td>
        <span class="country-pill">${label}</span>
        ${p.strict?'<span class="strict-tag">STRICT</span>':''}
      </td>
      <td id="ip-${p.name}">${ipHtml}</td>
      <td><span class="mono">${p.socks_port}</span></td>
      <td><span class="mono">${p.http_port}</span></td>
      <td class="actions">
        <button class="btn btn-warning" onclick="renew('${p.name}')">↻ Renew</button>
        <button class="btn btn-danger"  onclick="del('${p.name}')">✕</button>
      </td>
    </tr>`;
  }).join('');

  // Fetch IPs for running proxies not yet cached
  data.filter(p=>p.running).forEach(p=>{
    if(!ipCache[p.name]) fetchIp(p.name, p.socks_port);
  });
}

function openAdd(){ document.getElementById('modal-add').classList.add('open') }
function openSettings(){ document.getElementById('modal-settings').classList.add('open') }
function closeModal(id){ document.getElementById(id).classList.remove('open') }

document.querySelectorAll('.overlay').forEach(el=>
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open') })
);

async function doCreate(){
  const country=document.getElementById('add-country').value;
  const strict=document.getElementById('add-strict').checked;
  const qty=Math.max(1,Math.min(50,parseInt(document.getElementById('qty-display').value)||1));
  closeModal('modal-add');
  // reset qty for next time
  document.getElementById('qty-display').value=1;
  document.getElementById('btn-launch').textContent='Launch 1 Proxy';

  toast(`🚀 Starting ${qty} proxy${qty>1?'ies':''}…`, 14000);

  // launch all in parallel
  await Promise.all(Array.from({length:qty},()=>
    fetch(`${API}/proxies`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({country,strict,count:qty}),
    })
  ));

  // Tor needs ~8s to bootstrap
  setTimeout(()=>{ loadProxies(); toast(`✓ ${qty} proxy${qty>1?'ies':''} ready`); }, 9000);
}

async function del(name){
  if(!confirm(`Remove ${name}?`)) return;
  delete ipCache[name];
  await fetch(`${API}/proxies/${name}`,{method:'DELETE'});
  loadProxies(); toast(`✓ ${name} removed`);
}

async function renew(name){
  toast(`↻ Renewing ${name} circuit…`, 5000);
  delete ipCache[name];
  const d=await fetch(`${API}/proxies/${name}/renew`,{method:'POST'}).then(r=>r.json());
  setTimeout(()=>{ loadProxies(); toast(`✓ Circuit renewed (${d.method})`); }, 3000);
}

function saveSettings(){
  mode=document.getElementById('s-mode').value;
  updateBadge(); closeModal('modal-settings'); toast('✓ Settings saved');
}

function changeQty(delta){
  const el=document.getElementById('qty-display');
  let v=(parseInt(el.value)||1)+delta;
  if(v<1) v=1; if(v>50) v=50;
  el.value=v;
  updateLaunchBtn();
}
function updateLaunchBtn(){
  const v=parseInt(document.getElementById('qty-display').value)||1;
  document.getElementById('btn-launch').textContent=`Launch ${v} Proxy${v>1?'ies':''}`;
}

async function renewAll(){
  const data=await fetch(`${API}/proxies`).then(r=>r.json());
  const running=data.filter(p=>p.running);
  if(!running.length){ toast('No running proxies'); return; }
  toast(`↻ Renewing ${running.length} circuits…`, 8000);
  running.forEach(p=>{ delete ipCache[p.name]; });
  await Promise.all(running.map(p=>fetch(`${API}/proxies/${p.name}/renew`,{method:'POST'})));
  setTimeout(()=>{ loadProxies(); toast(`✓ All circuits renewed`); }, 3000);
}

async function killAll(){
  const data=await fetch(`${API}/proxies`).then(r=>r.json());
  if(!data.length){ await pruneDeadContainers(); toast('✓ No running proxies, dead containers pruned'); return; }
  if(!confirm(`Remove all ${data.length} proxy(ies)?`)) return;
  toast(`Removing ${data.length} proxies…`, 8000);
  data.forEach(p=>{ delete ipCache[p.name]; });
  await Promise.all(data.map(p=>fetch(`${API}/proxies/${p.name}`,{method:'DELETE'})));
  await pruneDeadContainers();
  loadProxies(); toast('✓ All proxies removed and cleaned');
}

async function pruneDeadContainers(){
  const r=await fetch(`${API}/proxies/prune`,{method:'POST'}).then(r=>r.json());
  if(r.pruned>0) toast(`🧹 ${r.pruned} dead container(s) pruned`);
  return r.pruned;
}

init();
setInterval(loadProxies, 20000);
</script>
</body>
</html>
