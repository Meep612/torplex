server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /opt/torplex/web/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
